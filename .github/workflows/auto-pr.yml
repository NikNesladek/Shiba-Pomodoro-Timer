name: Auto-create PR on branch push

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ github.ref_name }}" \
            --body "Automated PR for branch \`${{ github.ref_name }}\`. Pushed by @${{ github.actor }}." \
            --base main \
            --draft \
            || echo "PR already exists, skipping."
